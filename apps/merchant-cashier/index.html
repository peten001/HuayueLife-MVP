<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#061522" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="云桥收银" />
    <meta name="color-scheme" content="light" />
    <link rel="stylesheet" href="/terminal-bootstrap.css" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/yunqiao-mark.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <title>云桥 Life 收银台</title>
  </head>
  <body>
    <div id="app">
      <main
        id="cashier-boot"
        class="cashier-boot"
        data-state="loading"
        role="status"
        aria-live="polite"
        aria-busy="true"
      >
        <div class="cashier-boot__center">
          <section class="cashier-boot__card">
            <span class="cashier-boot__spinner" aria-hidden="true"></span>
            <strong class="cashier-boot__title">正在打开 Web 收银台</strong>
            <span id="cashier-boot-message" class="cashier-boot__message">
              正在初始化页面和登录状态…
            </span>
            <button
              id="cashier-boot-retry"
              class="cashier-boot__retry"
              type="button"
              hidden
            >重试</button>
          </section>
        </div>
      </main>
    </div>
    <script src="/terminal-bootstrap.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
