services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-huayue_life_mvp}
      MYSQL_USER: ${MYSQL_USER:-huayue}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - huayue_mvp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - huayue_mvp_redis_data:/data

volumes:
  huayue_mvp_mysql_data:
  huayue_mvp_redis_data:
